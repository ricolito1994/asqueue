services:

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./asq-frontend/dist:/var/www/asq-frontend/dist:ro
      - ./asq-auth-service/public:/var/www/asq-auth-service/public:ro
      - ./asq-notif-service/public:/var/www/asq-notif-service/public:ro
      - ./asq-gate-service/public:/var/www/asq-gate-service/public:ro
      - ./asq-queue-service/public:/var/www/asq-queue-service/public:ro
    depends_on:
      - asq-gate-service
      - asq-auth-service
      - asq-queue-service
      - asq-notif-service
    networks:
      - microservices

  asq-gate-service:
    build: ./asq-gate-service
    volumes:
      - ./asq-gate-service:/var/www/html
      - /var/www/html/vendor   
    networks:
      - microservices
    depends_on:
      - asq_database
      - redis

  asq-auth-service:
    build: ./asq-auth-service
    volumes:
      - ./asq-auth-service:/var/www/html
      - /var/www/html/vendor   
    networks:
      - microservices
    depends_on:
      - asq_database
      - redis

  asq-queue-service:
    build: ./asq-queue-service
    volumes:
      - ./asq-queue-service:/var/www/html
      - /var/www/html/vendor
    networks:
      - microservices
    depends_on:
      - asq_database
      - redis
  
  asq-notif-service:
    build: ./asq-notif-service
    volumes:
      - ./asq-notif-service:/var/www/html
      - /var/www/html/vendor
    networks:
      - microservices
    depends_on:
      - asq_database
      - redis

  asq_database:
    image: mysql:8.0
    container_name: asq_database
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - asq_mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - microservices

  redis:
    image: redis:7-alpine
    networks:
      - microservices

volumes:
  asq_mysql_data:

networks:
  microservices:
    driver: bridge